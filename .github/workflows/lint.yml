name: TypeScript checking and linting
on:
  pull_request:

jobs:
  tsc:
    name: TypeScript Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm ci
          npm run dev:check
          npm run dev:check:tests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: |
          npm ci
          npm run dev:lint
